<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - SAT-DISCOVERY</title>
  <link rel="stylesheet" href="css/theme.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #020b16;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .login-container {
      background: #0a1628;
      border: 1px solid #1a2942;
      border-radius: 12px;
      padding: 40px;
      max-width: 450px;
      width: 90%;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo h1 {
      color: #ffd700;
      font-size: 28px;
      margin: 0 0 10px 0;
    }

    .logo p {
      color: #8b949e;
      margin: 0;
      font-size: 14px;
    }

    .login-form {
      margin-top: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: #c9d1d9;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
    }

    input[type="email"] {
      width: 100%;
      padding: 12px 16px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 16px;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }

    input[type="email"]:focus {
      outline: none;
      border-color: #ffd700;
    }

    input[type="email"]::placeholder {
      color: #6e7681;
    }

    .submit-btn {
      width: 100%;
      padding: 12px;
      background: #ffd700;
      color: #020b16;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .submit-btn:hover:not(:disabled) {
      background: #ffed4e;
      transform: translateY(-1px);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .message {
      margin-top: 20px;
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 14px;
      display: none;
    }

    .message.success {
      background: rgba(46, 160, 67, 0.15);
      border: 1px solid rgba(46, 160, 67, 0.4);
      color: #3fb950;
    }

    .message.error {
      background: rgba(248, 81, 73, 0.15);
      border: 1px solid rgba(248, 81, 73, 0.4);
      color: #f85149;
    }

    .message.show {
      display: block;
    }

    .info-text {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #30363d;
      color: #8b949e;
      font-size: 13px;
      line-height: 1.6;
    }

    .info-text strong {
      color: #c9d1d9;
    }

    .back-link {
      text-align: center;
      margin-top: 20px;
    }

    .back-link a {
      color: #ffd700;
      text-decoration: none;
      font-size: 14px;
    }

    .back-link a:hover {
      text-decoration: underline;
    }

    .features {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #30363d;
    }

    .features h3 {
      color: #c9d1d9;
      font-size: 14px;
      margin: 0 0 12px 0;
    }

    .features ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .features li {
      color: #8b949e;
      font-size: 13px;
      padding: 6px 0;
      padding-left: 20px;
      position: relative;
    }

    .features li:before {
      content: "✓";
      position: absolute;
      left: 0;
      color: #3fb950;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <h1>🛰️ SAT-DISCOVERY</h1>
      <p>无存储算法处理平台</p>
    </div>

    <div class="login-form">
      <form id="magic-link-form">
        <div class="form-group">
          <label for="email">输入您的邮箱</label>
          <input 
            type="email" 
            id="email"
            name="email"
            placeholder="your@email.com"
            required
            autocomplete="email"
          />
        </div>

        <button type="submit" class="submit-btn" id="submit-btn">
          发送登录链接
        </button>
      </form>

      <div class="message" id="message"></div>

      <div class="info-text">
        <strong>无需密码，一键登录</strong><br>
        我们将发送一个登录链接到您的邮箱。点击链接即可登录并查看您的处理历史记录。
      </div>

      <div class="features">
        <h3>登录后您可以：</h3>
        <ul>
          <li>查看所有处理历史记录</li>
          <li>下载之前的处理结果</li>
          <li>继续提交新的处理任务</li>
          <li>管理您的账户设置</li>
        </ul>
      </div>
    </div>

    <div class="back-link">
      <a href="/">← 返回首页</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('magic-link-form');
    const emailInput = document.getElementById('email');
    const submitBtn = document.getElementById('submit-btn');
    const messageEl = document.getElementById('message');

    function showMessage(text, type) {
      messageEl.textContent = text;
      messageEl.className = `message ${type} show`;
    }

    function hideMessage() {
      messageEl.className = 'message';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessage();

      const email = emailInput.value.trim();
      
      if (!email) {
        showMessage('请输入邮箱地址', 'error');
        return;
      }

      // 简单的邮箱格式验证
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        showMessage('请输入有效的邮箱地址', 'error');
        return;
      }

      // 禁用按钮并显示加载状态
      submitBtn.disabled = true;
      submitBtn.textContent = '发送中...';

      try {
        const response = await fetch('/api/auth/send-magic-link', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ 
            email,
            redirect_url: '/history' 
          })
        });

        const data = await response.json();

        if (response.ok) {
          showMessage(
            '✅ 登录链接已发送到您的邮箱！请检查收件箱（可能在垃圾邮件中）',
            'success'
          );
          emailInput.value = '';
        } else {
          showMessage(data.error || '发送失败，请稍后重试', 'error');
        }
      } catch (error) {
        console.error('Error:', error);
        showMessage('网络错误，请检查连接后重试', 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '发送登录链接';
      }
    });

    // 模拟模式（后端未实现时用于测试）
    const DEMO_MODE = true;

    if (DEMO_MODE) {
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideMessage();

        const email = emailInput.value.trim();
        
        if (!email) {
          showMessage('请输入邮箱地址', 'error');
          return;
        }

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
          showMessage('请输入有效的邮箱地址', 'error');
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = '发送中...';

        // 模拟API调用延迟
        await new Promise(resolve => setTimeout(resolve, 1500));

        showMessage(
          '✅ [演示模式] 登录链接已发送到 ' + email + '！\n' +
          '(实际使用时需要后端支持)',
          'success'
        );
        emailInput.value = '';

        submitBtn.disabled = false;
        submitBtn.textContent = '发送登录链接';
      });
    }
  </script>
</body>
</html>
