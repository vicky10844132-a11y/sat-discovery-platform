<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的处理记录 - SAT-DISCOVERY</title>
  <link rel="stylesheet" href="css/theme.css">
  <style>
    body {
      background: #020b16;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 0;
    }

    .header {
      background: #0a1628;
      border-bottom: 1px solid #1a2942;
      padding: 20px;
    }

    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      color: #ffd700;
      font-size: 20px;
      font-weight: 600;
      text-decoration: none;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .user-email {
      color: #8b949e;
      font-size: 14px;
    }

    .logout-btn {
      background: transparent;
      color: #ffd700;
      border: 1px solid #ffd700;
      padding: 6px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    .logout-btn:hover {
      background: #ffd700;
      color: #020b16;
    }

    .container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
    }

    h1 {
      color: #ffd700;
      margin: 0 0 30px 0;
      font-size: 28px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: #0a1628;
      border: 1px solid #1a2942;
      border-radius: 8px;
      padding: 20px;
    }

    .stat-label {
      color: #8b949e;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .stat-value {
      color: #ffd700;
      font-size: 32px;
      font-weight: 600;
    }

    .history-list {
      background: #0a1628;
      border: 1px solid #1a2942;
      border-radius: 8px;
      overflow: hidden;
    }

    .history-item {
      padding: 20px;
      border-bottom: 1px solid #1a2942;
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr auto;
      gap: 20px;
      align-items: center;
    }

    .history-item:last-child {
      border-bottom: none;
    }

    .history-item:hover {
      background: rgba(255, 215, 0, 0.05);
    }

    .algorithm-name {
      color: #c9d1d9;
      font-weight: 500;
    }

    .algorithm-desc {
      color: #8b949e;
      font-size: 13px;
      margin-top: 4px;
    }

    .status {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
      text-align: center;
    }

    .status.completed {
      background: rgba(46, 160, 67, 0.15);
      color: #3fb950;
    }

    .status.processing {
      background: rgba(255, 215, 0, 0.15);
      color: #ffd700;
    }

    .status.failed {
      background: rgba(248, 81, 73, 0.15);
      color: #f85149;
    }

    .status.pending {
      background: rgba(139, 148, 158, 0.15);
      color: #8b949e;
    }

    .date {
      color: #8b949e;
      font-size: 14px;
    }

    .download-btn {
      background: #ffd700;
      color: #020b16;
      padding: 8px 16px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
      display: inline-block;
    }

    .download-btn:hover {
      background: #ffed4e;
      transform: translateY(-1px);
    }

    .download-btn.disabled {
      background: #30363d;
      color: #6e7681;
      cursor: not-allowed;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #8b949e;
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    .empty-state h2 {
      color: #c9d1d9;
      margin: 0 0 10px 0;
    }

    .empty-state p {
      margin: 0 0 20px 0;
    }

    .start-btn {
      background: #ffd700;
      color: #020b16;
      padding: 12px 24px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      display: inline-block;
    }

    .start-btn:hover {
      background: #ffed4e;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #8b949e;
    }

    .login-prompt {
      background: #0a1628;
      border: 1px solid #1a2942;
      border-radius: 8px;
      padding: 40px;
      text-align: center;
      max-width: 500px;
      margin: 0 auto;
    }

    .login-prompt h2 {
      color: #ffd700;
      margin: 0 0 15px 0;
    }

    .login-prompt p {
      color: #8b949e;
      margin: 0 0 25px 0;
    }

    .login-link {
      background: #ffd700;
      color: #020b16;
      padding: 12px 24px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      display: inline-block;
    }

    .login-link:hover {
      background: #ffed4e;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-content">
      <a href="/" class="logo">🛰️ SAT-DISCOVERY</a>
      <div class="user-info" id="user-info" style="display: none;">
        <span class="user-email" id="user-email"></span>
        <button class="logout-btn" onclick="logout()">登出</button>
      </div>
    </div>
  </div>

  <div class="container">
    <h1>我的处理记录</h1>

    <!-- 统计卡片 -->
    <div class="stats" id="stats" style="display: none;">
      <div class="stat-card">
        <div class="stat-label">总处理次数</div>
        <div class="stat-value" id="total-tasks">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">已完成</div>
        <div class="stat-value" id="completed-tasks">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">处理中</div>
        <div class="stat-value" id="processing-tasks">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">失败</div>
        <div class="stat-value" id="failed-tasks">0</div>
      </div>
    </div>

    <!-- 历史记录列表 -->
    <div class="history-list" id="history-list">
      <div class="loading">加载中...</div>
    </div>

    <!-- 未登录提示 -->
    <div class="login-prompt" id="login-prompt" style="display: none;">
      <h2>查看处理记录</h2>
      <p>请先登录以查看您的处理历史记录</p>
      <a href="/login.html" class="login-link">登录</a>
    </div>
  </div>

  <script>
    // 检查登录状态
    async function checkAuth() {
      try {
        const response = await fetch('/api/auth/me');
        
        if (response.ok) {
          const data = await response.json();
          return data.user;
        } else {
          return null;
        }
      } catch (error) {
        console.error('Auth check failed:', error);
        return null;
      }
    }

    // 加载历史记录
    async function loadHistory() {
      try {
        const response = await fetch('/api/processing-history');
        
        if (response.ok) {
          const data = await response.json();
          return data.history;
        } else {
          return null;
        }
      } catch (error) {
        console.error('Failed to load history:', error);
        return null;
      }
    }

    // 渲染历史记录
    function renderHistory(history) {
      const listEl = document.getElementById('history-list');
      
      if (!history || history.length === 0) {
        listEl.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📭</div>
            <h2>暂无处理记录</h2>
            <p>开始您的第一个处理任务吧！</p>
            <a href="/algorithms.html" class="start-btn">浏览算法</a>
          </div>
        `;
        return;
      }

      listEl.innerHTML = history.map(item => `
        <div class="history-item">
          <div>
            <div class="algorithm-name">${item.algorithm}</div>
            <div class="algorithm-desc">${item.input_source || '未知来源'}</div>
          </div>
          <div class="status ${item.status}">${getStatusText(item.status)}</div>
          <div class="date">${formatDate(item.started_at)}</div>
          <div class="date">${formatDuration(item.started_at, item.completed_at)}</div>
          <div>
            ${item.output_url ? 
              `<a href="${item.output_url}" class="download-btn" download>下载</a>` :
              `<span class="download-btn disabled">-</span>`
            }
          </div>
        </div>
      `).join('');
    }

    // 更新统计
    function updateStats(history) {
      if (!history || history.length === 0) return;

      const stats = {
        total: history.length,
        completed: history.filter(h => h.status === 'completed').length,
        processing: history.filter(h => h.status === 'processing').length,
        failed: history.filter(h => h.status === 'failed').length
      };

      document.getElementById('total-tasks').textContent = stats.total;
      document.getElementById('completed-tasks').textContent = stats.completed;
      document.getElementById('processing-tasks').textContent = stats.processing;
      document.getElementById('failed-tasks').textContent = stats.failed;
      document.getElementById('stats').style.display = 'grid';
    }

    // 状态文本
    function getStatusText(status) {
      const statusMap = {
        'pending': '等待中',
        'processing': '处理中',
        'completed': '已完成',
        'failed': '失败'
      };
      return statusMap[status] || status;
    }

    // 格式化日期
    function formatDate(dateString) {
      if (!dateString) return '-';
      const date = new Date(dateString);
      const now = new Date();
      const diff = now - date;
      
      if (diff < 60000) return '刚刚';
      if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
      if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
      if (diff < 604800000) return Math.floor(diff / 86400000) + '天前';
      
      return date.toLocaleDateString('zh-CN');
    }

    // 格式化持续时间
    function formatDuration(startDate, endDate) {
      if (!startDate || !endDate) return '-';
      
      const start = new Date(startDate);
      const end = new Date(endDate);
      const diff = end - start;
      
      if (diff < 1000) return '< 1秒';
      if (diff < 60000) return Math.floor(diff / 1000) + '秒';
      if (diff < 3600000) return Math.floor(diff / 60000) + '分钟';
      
      return Math.floor(diff / 3600000) + '小时';
    }

    // 登出
    async function logout() {
      try {
        await fetch('/api/auth/logout', { method: 'POST' });
        window.location.href = '/';
      } catch (error) {
        console.error('Logout failed:', error);
        window.location.href = '/';
      }
    }

    // 初始化页面
    async function init() {
      const user = await checkAuth();
      
      if (!user) {
        // 未登录
        document.getElementById('history-list').style.display = 'none';
        document.getElementById('login-prompt').style.display = 'block';
        return;
      }

      // 已登录，显示用户信息
      document.getElementById('user-email').textContent = user.email;
      document.getElementById('user-info').style.display = 'flex';

      // 加载历史记录
      const history = await loadHistory();
      
      if (history) {
        renderHistory(history);
        updateStats(history);
      } else {
        document.getElementById('history-list').innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">⚠️</div>
            <h2>加载失败</h2>
            <p>无法加载历史记录，请稍后重试</p>
          </div>
        `;
      }
    }

    // 演示模式（后端未实现时）
    const DEMO_MODE = true;

    if (DEMO_MODE) {
      // 模拟用户和历史数据
      const mockUser = {
        id: 'demo-user',
        email: 'demo@example.com',
        total_tasks: 12
      };

      const mockHistory = [
        {
          id: '1',
          algorithm: 'NDVI 计算',
          input_source: 's3://bucket/sentinel2.tif',
          output_url: '#',
          status: 'completed',
          started_at: new Date(Date.now() - 3600000).toISOString(),
          completed_at: new Date(Date.now() - 3540000).toISOString()
        },
        {
          id: '2',
          algorithm: 'Cloud Mask',
          input_source: 'https://example.com/landsat8.tif',
          output_url: '#',
          status: 'completed',
          started_at: new Date(Date.now() - 86400000).toISOString(),
          completed_at: new Date(Date.now() - 86340000).toISOString()
        },
        {
          id: '3',
          algorithm: 'SAR 斑点滤波',
          input_source: 's3://bucket/sentinel1.tif',
          output_url: null,
          status: 'processing',
          started_at: new Date(Date.now() - 60000).toISOString(),
          completed_at: null
        },
        {
          id: '4',
          algorithm: 'DEM 坡度分析',
          input_source: 'https://example.com/srtm.tif',
          output_url: '#',
          status: 'completed',
          started_at: new Date(Date.now() - 172800000).toISOString(),
          completed_at: new Date(Date.now() - 172740000).toISOString()
        },
        {
          id: '5',
          algorithm: 'NDWI 计算',
          input_source: 's3://bucket/landsat8.tif',
          output_url: null,
          status: 'failed',
          started_at: new Date(Date.now() - 259200000).toISOString(),
          completed_at: new Date(Date.now() - 259140000).toISOString()
        }
      ];

      // 覆盖init函数
      init = async function() {
        // 显示用户信息
        document.getElementById('user-email').textContent = mockUser.email + ' (演示)';
        document.getElementById('user-info').style.display = 'flex';

        // 渲染历史记录
        renderHistory(mockHistory);
        updateStats(mockHistory);
      };
    }

    // 页面加载时初始化
    init();
  </script>
</body>
</html>
