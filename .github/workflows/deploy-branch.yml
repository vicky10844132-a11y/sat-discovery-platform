name: Deploy Branch to Vercel

# Triggers:
# 1. Every push to the fix branch deploys immediately (no environment approval gate)
# 2. workflow_dispatch: owner can click "Run workflow" from the Actions tab
#    (this button appears when a workflow with workflow_dispatch exists on the
#    current branch being viewed — select the fix branch in the dropdown)

on:
  push:
    branches:
      - copilot/fix-map-display-issue
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Check required secrets
        # Fail fast with a clear message if VERCEL_TOKEN is not configured.
        # Setup guide: https://vercel.com/docs/rest-api#authentication
        # Repository Settings → Secrets → Actions → New repository secret
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_TOKEN secret is not set."
            echo ""
            echo "To fix this:"
            echo "1. Get your Vercel token: https://vercel.com/account/tokens"
            echo "2. Add it as a repository secret:"
            echo "   GitHub repo → Settings → Secrets and variables → Actions → New repository secret"
            echo "   Name: VERCEL_TOKEN"
            echo "3. Also add VERCEL_ORG_ID and VERCEL_PROJECT_ID from your Vercel project settings."
            exit 1
          fi
          if [ -z "$VERCEL_ORG_ID" ]; then
            echo "::error::VERCEL_ORG_ID secret is not set. Find it in Vercel project Settings → General."
            exit 1
          fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::error::VERCEL_PROJECT_ID secret is not set. Find it in Vercel project Settings → General."
            exit 1
          fi
          echo "All required secrets are present."
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel Production
        # VERCEL_TOKEN is read as an env var by the CLI (no --token flag needed).
        # This avoids the "missing value" error when the secret is empty.
        run: vercel --prod --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Verify deployment
        run: |
          echo "Waiting 30 s for Vercel to propagate..."
          sleep 30
          echo "=== js/map.js version check ==="
          curl -sf https://www.sat-index.online/js/map.js | grep -m1 "MapInit\|Phase" || echo "Could not verify"
          echo "=== HTTP headers ==="
          curl -sI https://www.sat-index.online/ | head -10
